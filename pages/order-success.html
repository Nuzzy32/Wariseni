<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan Berhasil - Karya Lokal</title>
  <link rel="stylesheet" href="../dist/output.css" />
  <script src="../assets/js/session.js"></script>
  <script>(function(){if(!window.KL||!window.KL.requireLogin())return;}());</script>
</head>
<body class="bg-[#fdfbf7] font-sans text-slate-900" data-page="order-success">
  <main class="mx-auto flex min-h-dvh max-w-[960px] items-center px-4 py-10 sm:px-6">
    <section class="w-full rounded-3xl border border-neutral-100 bg-white p-6 text-center shadow-sm sm:p-10">
      <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100 text-emerald-700">
        <svg class="h-8 w-8" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 4 4L19 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="mt-6 text-xs font-bold uppercase tracking-[0.22em] text-orange-600">Pesanan Berhasil</p>
      <h1 class="mt-2 text-3xl font-bold tracking-[-0.03em] text-slate-950 sm:text-4xl">Terima kasih, pesanan kamu sudah dibuat.</h1>
      <p class="mx-auto mt-3 max-w-xl text-sm leading-7 text-slate-500">Invoice, status pembayaran, dan tracking kini punya tempat yang jelas di flow pembelian.</p>

      <div class="mx-auto mt-8 max-w-2xl rounded-2xl border border-neutral-100 bg-neutral-50 p-5 text-left">
        <div class="grid gap-4 sm:grid-cols-3">
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Order ID</p>
            <strong class="mt-1 block text-slate-900" data-order-id>KL-000000</strong>
          </div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Total</p>
            <strong class="mt-1 block text-slate-900" data-order-total>Rp 0</strong>
          </div>
          <div>
            <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Pembayaran</p>
            <strong class="mt-1 block text-slate-900" data-order-payment>Transfer Bank</strong>
          </div>
        </div>
        <div class="mt-5 border-t border-neutral-200 pt-5">
          <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Dikirim ke</p>
          <p class="mt-2 text-sm leading-7 text-slate-600" data-order-address>-</p>
        </div>
        <div class="mt-5 space-y-3" data-order-items></div>
      </div>

      <div class="mt-8 flex flex-col justify-center gap-3 sm:flex-row">
        <a class="inline-flex items-center justify-center rounded-xl bg-orange-600 px-6 py-3 text-sm font-bold text-white shadow-[0_4px_14px_rgba(234,88,12,0.28)] transition hover:bg-orange-700" href="marketplace.html">Belanja Lagi</a>
        <a class="inline-flex items-center justify-center rounded-xl border border-neutral-200 bg-white px-6 py-3 text-sm font-bold text-slate-700 transition hover:border-orange-300 hover:text-orange-600" href="settings/settings-orders.html">Lihat Pesanan</a>
      </div>
    </section>
  </main>

  <script src="../assets/js/cart-store.js"></script>
  <script>
  (function () {
    'use strict';
    var cart = window.KaryaCart;
    var order = cart.getLastOrder();
    if (!order) {
      window.location.replace('marketplace.html');
      return;
    }

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, function (char) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
      });
    }

    document.querySelector('[data-order-id]').textContent = order.id;
    document.querySelector('[data-order-total]').textContent = cart.formatRupiah(order.summary.total);
    document.querySelector('[data-order-payment]').textContent = order.customer.payment || 'Transfer Bank';
    document.querySelector('[data-order-address]').textContent = order.customer.name + ' - ' + order.customer.phone + ', ' + order.customer.address + ', ' + order.customer.city + ' ' + order.customer.postal;
    document.querySelector('[data-order-items]').innerHTML = order.items.map(function (item) {
      return '<div class="flex items-center gap-3 rounded-xl bg-white p-3"><img class="h-12 w-12 rounded-lg object-cover" src="../' + esc(item.image) + '" alt="' + esc(item.title) + '" /><div class="min-w-0 flex-1"><p class="text-sm font-bold text-slate-900">' + esc(item.title) + '</p><p class="text-xs text-slate-500">Qty ' + item.quantity + '</p></div><strong class="text-sm">' + cart.formatRupiah(Number(item.price) * Number(item.quantity)) + '</strong></div>';
    }).join('');
  }());
  </script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
