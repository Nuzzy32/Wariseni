<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alamat Saya — Karya Lokal</title>
  <link rel="stylesheet" href="../../dist/output.css" />
  <script src="../../assets/js/session.js"></script>
  <script>(function(){if(!window.KL||!window.KL.requireLogin())return;}());</script>
</head>
<body data-page="settings" data-font="manrope">
  <main class="account-page">
    <section class="account-shell">
      <aside class="account-sidebar" data-reveal="1">
        <div class="account-user">
          <div class="account-user__avatar" data-account-initial>B</div>
          <div class="min-w-0">
            <strong class="block truncate text-sm text-cocoa-900" data-account-name>Budi Santoso</strong>
            <a class="mt-1 inline-flex items-center gap-1 text-xs font-semibold text-muted hover:text-clay-700" href="settings.html">
              <svg class="h-3.5 w-3.5" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="m2 11.8-.4 2.6 2.6-.4 8.2-8.2-2.2-2.2L2 11.8Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="m9.4 4.4 2.2 2.2" stroke="currentColor" stroke-width="1.4"/></svg>
              Ubah Profil
            </a>
          </div>
        </div>

        <nav class="account-nav" aria-label="Menu akun pembeli">
          <div class="account-nav__group">
            <a class="account-nav__title" href="settings.html">
              <svg class="h-5 w-5 text-clay-700" viewBox="0 0 20 20" fill="none" aria-hidden="true"><circle cx="10" cy="6" r="3.2" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 17a6.5 6.5 0 0 1 13 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              Akun Saya
            </a>
            <a class="account-nav__link" href="settings.html">Profil</a>
            <a class="account-nav__link" href="settings-payment.html">Bank &amp; Kartu</a>
            <a class="account-nav__link is-active" href="settings-addresses.html">Alamat</a>
            <a class="account-nav__link" href="settings-password.html">Ubah Password</a>
            <a class="account-nav__link" href="settings-notifications.html">Pengaturan Notifikasi</a>
            <a class="account-nav__link" href="settings-privacy.html">Pengaturan Privasi</a>
          </div>
          <a class="account-nav__title" href="settings-orders.html">
            <svg class="h-5 w-5 text-clay-700" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Pesanan Saya
          </a>
          <a class="account-nav__title" href="settings-notifications.html">
            <svg class="h-5 w-5 text-clay-700" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M15 8a5 5 0 1 0-10 0v3.6L3.8 14h12.4L15 11.6V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 16a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Notifikasi
          </a>
        </nav>

        <button class="account-logout" type="button" data-account-logout>Keluar</button>
      </aside>

      <section class="account-content" data-reveal style="--reveal-delay: 0.12s">
        <article class="account-panel">
          <div class="account-panel__header account-panel__header--row">
            <div>
              <h1>Alamat Saya</h1>
              <p>Alamat penerima untuk transaksi dan pengiriman.</p>
            </div>
            <button class="account-btn account-btn--primary" type="button" data-address-add>Tambahkan Alamat</button>
          </div>
          <div class="account-address-list" data-account-addresses></div>
          <form class="account-address-form hidden" data-address-form>
            <input type="hidden" name="id" />
            <div class="grid gap-4 md:grid-cols-2">
              <label>Label Alamat<input name="label" type="text" placeholder="Rumah / Kantor" required /></label>
              <label>Penerima<input name="recipient" type="text" placeholder="Nama penerima" required /></label>
              <label>Kota<input name="city" type="text" placeholder="Jakarta Selatan" required /></label>
              <label>Kode Pos<input name="postal" type="text" placeholder="12190" required /></label>
            </div>
            <label class="mt-4 block">Detail Alamat<textarea name="detail" placeholder="Nama jalan, nomor rumah, patokan, kecamatan." required></textarea></label>
            <label class="mt-4 flex items-center gap-3 text-sm font-semibold text-cocoa-900"><input name="primary" type="checkbox" /> Jadikan alamat utama</label>
            <div class="account-actions">
              <button class="account-btn account-btn--ghost" type="button" data-address-cancel>Batal</button>
              <button class="account-btn account-btn--primary" type="submit">Simpan Alamat</button>
            </div>
          </form>
        </article>
      </section>
    </section>
  </main>

  <script src="../../assets/js/cart-store.js"></script>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
