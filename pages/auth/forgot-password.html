<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atur Ulang Kata Sandi — Karya Lokal</title>
  <link rel="stylesheet" href="../../dist/output.css" />
</head>
<body class="auth-page">
  <main class="flex min-h-screen items-center justify-center px-4 py-10 sm:px-6">
    <div class="panel-glass w-full max-w-xl p-6 sm:p-8" data-reveal="1">
      <div class="mx-auto max-w-md text-center">
        <span class="mx-auto inline-flex h-16 w-16 items-center justify-center rounded-[1.5rem] bg-clay-50 text-2xl text-clay-700 shadow-soft">↺</span>
        <h1 class="mt-6 font-display text-5xl tracking-[-0.05em] text-cocoa-900">Atur Ulang Kata Sandi</h1>
        <p class="mt-4 text-base leading-8 text-muted">Masukkan alamat email yang terdaftar untuk menerima tautan pengaturan ulang kata sandi Anda.</p>
      </div>

      <form class="mx-auto mt-8 max-w-md space-y-4" data-forgot-password>
        <label class="block space-y-2 text-left">
          <span class="text-sm font-semibold text-cocoa-900">Alamat Email</span>
          <input class="field-input rounded-3xl border border-cocoa-900/10 bg-white px-5 py-4 shadow-soft" id="resetEmail" type="email" placeholder="Alamat Email" required />
        </label>
        <button class="btn--primary w-full" type="submit">Kirim Tautan</button>
      </form>

      <div class="mt-6 text-center">
        <a class="text-link text-sm" href="../auth/login.html">← Kembali ke Login</a>
      </div>
    </div>
  </main>

  <script src="../../assets/js/cart-store.js"></script>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
