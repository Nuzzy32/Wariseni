<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — Karya Lokal</title>
  <link rel="stylesheet" href="../../dist/output.css" />
</head>
<body class="min-h-screen bg-[#fffaf5] font-sans text-slate-900 antialiased">

  <main class="grid min-h-screen lg:grid-cols-2">
    <section class="relative flex min-h-screen items-center justify-center bg-[#fffaf5] px-6 py-16 sm:px-12 lg:px-24">
      <div class="pointer-events-none absolute left-6 top-6 h-24 w-24 rounded-br-[48px] rounded-tl-[48px] bg-orange-200/65"></div>
      <p class="pointer-events-none absolute bottom-6 left-0 right-0 hidden text-center text-xs leading-4 text-slate-900/40 lg:block">© 2024 Karya Lokal. All rights reserved.</p>

      <div class="w-full max-w-[440px]">
        <div>
          <h1 class="text-5xl font-extrabold leading-none tracking-[-0.045em] text-slate-900">
            Bergabung<br />
            <span class="text-orange-600">Bersama Kami</span>
          </h1>
          <p class="mt-6 text-lg leading-8 text-slate-500">
            Mulai perjalanan Anda menemukan keindahan karya lokal Indonesia hari ini.
          </p>
        </div>

        <form id="registerForm" class="mt-10 space-y-5" action="#" method="POST" novalidate>
          <label class="block space-y-2">
            <span class="block pl-1 text-sm font-bold leading-5 text-slate-700">Nama Lengkap</span>
            <span class="relative block">
              <svg class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
              <input id="reg-fullname" class="h-[52px] w-full rounded-xl border border-slate-200 bg-white py-3.5 pl-11 pr-4 text-base text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10" type="text" name="fullname" autocomplete="name" placeholder="Masukkan nama lengkap Anda" required />
            </span>
          </label>

          <label class="block space-y-2">
            <span class="block pl-1 text-sm font-bold leading-5 text-slate-700">Email</span>
            <span class="relative block">
              <svg class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" /></svg>
              <input id="reg-email" class="h-[52px] w-full rounded-xl border border-slate-200 bg-white py-3.5 pl-11 pr-4 text-base text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10" type="email" name="email" autocomplete="email" placeholder="contoh@email.com" required />
            </span>
          </label>

          <label class="block space-y-2">
            <span class="block pl-1 text-sm font-bold leading-5 text-slate-700">Kata Sandi</span>
            <span class="relative block">
              <svg class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="10" width="16" height="10" rx="2" /><path d="M8 10V7a4 4 0 0 1 8 0v3" /></svg>
              <input id="reg-password" class="h-[52px] w-full rounded-xl border border-slate-200 bg-white py-3.5 pl-11 pr-12 text-base text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10" type="password" name="password" autocomplete="new-password" placeholder="Masukkan kata sandi" required />
              <button class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-orange-600" type="button" data-target="reg-password" aria-label="Tampilkan kata sandi">
                <svg class="eye-off h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.1 10.1 0 0 1 12 20C5 20 1 12 1 12a18.5 18.5 0 0 1 5.06-5.94" /><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" /><path d="M1 1l22 22" /></svg>
                <svg class="eye-on hidden h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" /><circle cx="12" cy="12" r="3" /></svg>
              </button>
            </span>
          </label>

          <label class="block space-y-2">
            <span class="block pl-1 text-sm font-bold leading-5 text-slate-700">Konfirmasi Kata Sandi</span>
            <span class="relative block">
              <svg class="absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" /><path d="m9 12 2 2 4-4" /></svg>
              <input id="reg-confirm-password" class="h-[52px] w-full rounded-xl border border-slate-200 bg-white py-3.5 pl-11 pr-12 text-base text-slate-900 shadow-sm outline-none placeholder:text-slate-400 focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10" type="password" name="confirm-password" autocomplete="new-password" placeholder="Ulangi kata sandi" required />
              <button class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-orange-600" type="button" data-target="reg-confirm-password" aria-label="Tampilkan kata sandi">
                <svg class="eye-off h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.1 10.1 0 0 1 12 20C5 20 1 12 1 12a18.5 18.5 0 0 1 5.06-5.94" /><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" /><path d="M1 1l22 22" /></svg>
                <svg class="eye-on hidden h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z" /><circle cx="12" cy="12" r="3" /></svg>
              </button>
            </span>
          </label>

          <button class="mt-3 h-[52px] w-full rounded-xl bg-orange-600 text-base font-bold text-white shadow-md transition hover:bg-orange-700 active:scale-[0.99]" type="submit">Daftar Sekarang</button>

          <p class="pt-2 text-center text-sm font-medium text-slate-500">
            Sudah punya akun?
            <a class="font-bold text-orange-600 hover:text-orange-700" href="../auth/login.html">Masuk di sini</a>
          </p>
        </form>
      </div>
    </section>

    <section class="relative hidden min-h-screen overflow-hidden bg-slate-100 lg:block" aria-label="Heritage and craft">
      <img class="absolute inset-0 h-full w-full object-cover" src="../../assets/images/0bfe8a25be9b1574ac37c77c1068bf2566685320.png" alt="Pengrajin tenun sedang bekerja." />
      <div class="absolute inset-0 bg-black/55"></div>
      <div class="absolute bottom-24 left-16 max-w-[560px] text-white">
        <div class="mb-6 flex items-center gap-3">
          <span class="h-px w-12 bg-white/60"></span>
          <span class="text-xs font-bold uppercase leading-4 tracking-[0.22em] text-white/80">Heritage &amp; Craft</span>
        </div>
        <blockquote class="text-4xl font-extrabold leading-[1.1] tracking-[-0.04em] drop-shadow-lg">
          "Setiap goresan tangan adalah cerita yang abadi dari Nusantara."
        </blockquote>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("click", function (event) {
      const button = event.target.closest(".toggle-password");
      if (!button) return;
      const input = document.getElementById(button.dataset.target);
      if (!input) return;

      const show = input.type === "password";
      input.type = show ? "text" : "password";
      button.querySelector(".eye-off")?.classList.toggle("hidden", show);
      button.querySelector(".eye-on")?.classList.toggle("hidden", !show);
    });

    document.getElementById("registerForm")?.addEventListener("submit", function (event) {
      event.preventDefault();
      const password = document.getElementById("reg-password");
      const confirmPassword = document.getElementById("reg-confirm-password");
      if (password && confirmPassword && password.value !== confirmPassword.value) {
        alert("Kata sandi tidak cocok. Silakan periksa kembali.");
        return;
      }
      alert("Pendaftaran berhasil! (Hubungkan ke backend Anda.)");
      event.currentTarget.reset();
    });
  </script>
</body>
</html>
