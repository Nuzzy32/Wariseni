<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifikasi Kode — Karya Lokal</title>
  <link rel="stylesheet" href="../../dist/output.css" />
</head>
<body class="auth-page">
  <main class="flex min-h-screen items-center justify-center px-4 py-10 sm:px-6">
    <div class="panel-glass w-full max-w-xl p-6 sm:p-8" data-verification data-reveal="1">
      <div class="mx-auto max-w-md text-center">
        <span class="mx-auto inline-flex h-16 w-16 items-center justify-center rounded-[1.5rem] bg-clay-50 text-2xl text-clay-700 shadow-soft">🛡</span>
        <h1 class="mt-6 font-display text-5xl tracking-[-0.05em] text-cocoa-900">Masukkan Kode Verifikasi</h1>
        <p class="mt-4 text-base leading-8 text-muted">Masukkan 6 digit kode yang telah kami kirimkan ke email Anda.</p>
      </div>

      <div class="mx-auto mt-8 max-w-md">
        <div class="grid grid-cols-6 gap-3">
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
          <input class="field-input rounded-2xl border border-cocoa-900/10 bg-white px-0 py-4 text-center text-xl font-semibold shadow-soft" data-code-input inputmode="numeric" maxlength="1" />
        </div>
        <button class="btn--light mt-5 w-full" type="button" data-code-submit disabled>Verifikasi</button>
        <p class="mt-5 text-center text-sm text-muted">Tidak menerima kode? <span class="font-semibold text-clay-700">Kirim ulang dalam <span data-resend-timer>00:59</span></span></p>
        <div class="mt-6 text-center">
          <a class="text-link text-sm" href="../auth/login.html">← Kembali ke Login</a>
        </div>
      </div>
    </div>
  </main>

  <script src="../../assets/js/cart-store.js"></script>
  <script src="../../assets/js/main.js"></script>
</body>
</html>
