<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifikasi — Karya Lokal</title>
  <link rel="stylesheet" href="../dist/output.css" />
  <script src="../assets/js/session.js"></script>
  <script>(function(){if(!window.KL||!window.KL.requireLogin())return;}());</script>
</head>
<body data-page="notifications" class="bg-[#fdfbf7] font-sans text-slate-900">

  <main id="notifications-main" class="mx-auto max-w-[1080px] px-4 py-10 sm:px-6 lg:px-8">
    <section class="rounded-3xl border border-neutral-100 bg-white p-6 shadow-sm sm:p-8" data-reveal>
      <div class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-xs font-extrabold uppercase tracking-[0.22em] text-orange-600">Notification Center</p>
          <h1 class="mt-2 text-3xl font-extrabold tracking-[-0.035em] text-slate-950 sm:text-4xl">Semua update belanja kamu.</h1>
          <p class="mt-3 max-w-2xl text-sm leading-7 text-slate-500">Pantau order dibuat, pembayaran menunggu, pengiriman, promo wishlist, dan reminder review dalam satu tempat.</p>
        </div>
        <div class="grid grid-cols-2 gap-3 sm:min-w-56">
          <div class="rounded-2xl bg-orange-50 px-4 py-3">
            <p class="text-xs font-bold uppercase tracking-[0.16em] text-orange-600">Baru</p>
            <strong class="mt-1 block text-2xl text-slate-950" data-notifications-unread>0</strong>
          </div>
          <div class="rounded-2xl bg-slate-50 px-4 py-3">
            <p class="text-xs font-bold uppercase tracking-[0.16em] text-slate-500">Total</p>
            <strong class="mt-1 block text-2xl text-slate-950" data-notifications-total>0</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="mt-6 space-y-3" data-notifications-list data-reveal style="--reveal-delay: 0.08s"></section>
  </main>

  <script src="../assets/js/cart-store.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
